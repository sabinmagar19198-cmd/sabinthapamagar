# ============================================================
# netlify.toml for sabinthapamagar.com.np
# ============================================================

# ----- Build settings (update if you ever add a build step) -----
[build]
  publish = "."       # root folder — change to "dist" or "build" if you ever use a bundler

# ----- Redirect: HTTP → HTTPS (force secure) --------------------
[[redirects]]
  from   = "http://sabinthapamagar.com.np/*"
  to     = "https://sabinthapamagar.com.np/:splat"
  status = 301
  force  = true

# ----- Redirect: www → non-www ----------------------------------
[[redirects]]
  from   = "https://www.sabinthapamagar.com.np/*"
  to     = "https://sabinthapamagar.com.np/:splat"
  status = 301
  force  = true

# ----- Redirect: Netlify subdomain → custom domain --------------
[[redirects]]
  from   = "https://sabinthapamagar.netlify.app/*"
  to     = "https://sabinthapamagar.com.np/:splat"
  status = 301
  force  = true

# ----- Security Headers (all pages) ----------------------------
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking (embedding your site in iframes)
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing (important for XSS protection)
    X-Content-Type-Options = "nosniff"

    # Control referrer info when linking to other sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Force HTTPS for 1 year (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Permissions policy — disable unused browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Basic Content Security Policy
    # ⚠️  If you load Google Fonts, CDN scripts, or external APIs, add their origins here
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';"

# ----- Cache static assets for performance ----------------------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
