<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Sabin Thapa Magar</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #f7f9fc;
      --paper: #ffffff;
      --ink: #111827;
      --muted: #5b6472;
      --line: #dce5ee;
      --blue: #1e5eff;
      --navy: #0f172a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(90deg, rgba(30,94,255,.07) 1px, transparent 1px),
        linear-gradient(0deg, rgba(30,94,255,.06) 1px, transparent 1px),
        var(--bg);
      background-size: 44px 44px;
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 24px 60px rgba(23, 32, 51, .10);
      padding: 36px;
    }
    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--navy);
      color: #fff;
      font-weight: 800;
      margin-bottom: 22px;
    }
    h1 { font-size: clamp(30px, 7vw, 44px); line-height: 1; letter-spacing: -0.04em; margin-bottom: 14px; }
    p { color: var(--muted); line-height: 1.7; margin-bottom: 26px; }
    a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">ST</div>
    <h1>Message received.</h1>
    <p>Thank you for reaching out. Your message has been submitted through the site contact form, and Sabin will reply as soon as possible.</p>
    <a href="/">Back to Portfolio</a>
  </main>
</body>
</html>
